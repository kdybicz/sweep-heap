name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

env:
  AUTH_SECRET: ci-auth-secret
  AUTH_URL: http://localhost:3000
  DATABASE_URL: postgresql://chores:chores@localhost:5432/chores
  SMTP_FROM: The Sweep Heap <no-reply@example.com>
  SMTP_HOST: localhost

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # actions/checkout@v6.0.2
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node@v6.3.0
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: make install

      - name: Run lint
        run: make lint

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # actions/checkout@v6.0.2
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # actions/setup-node@v6.3.0
      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version-file: .nvmrc
          cache: yarn

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: make install

      - name: Run tests
        run: make test
