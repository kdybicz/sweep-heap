services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chores
      POSTGRES_PASSWORD: chores
      POSTGRES_DB: chores
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:
